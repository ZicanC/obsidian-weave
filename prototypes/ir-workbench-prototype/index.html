<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>增量阅读工作台原型</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-text">
          <h1>增量阅读工作台</h1>
          <p>全局队列视图</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn-soft" id="clear-date-btn">清空日期筛选</button>
        <button class="btn-primary" id="continue-btn">继续今日阅读</button>
      </div>
    </header>

    <section class="metrics" id="metrics-grid"></section>

    <section class="insight-grid">
      <article class="panel insight-panel">
        <div class="panel-header compact">
          <h2>队列健康</h2>
        </div>
        <div id="queue-lanes" class="queue-lanes"></div>
      </article>

      <article class="panel insight-panel">
        <div class="panel-header compact">
          <h2>14天推进趋势</h2>
        </div>
        <div class="trend-wrap">
          <div id="trend-bars" class="trend-bars"></div>
          <div class="trend-axis">
            <span>14天前</span>
            <span>今天</span>
          </div>
        </div>
      </article>

      <article class="panel insight-panel">
        <div class="panel-header compact">
          <h2>最新活动流</h2>
        </div>
        <div class="feed-wrap">
          <ul id="feed-list" class="feed-list"></ul>
        </div>
      </article>
    </section>

    <section class="calendar-panel panel">
      <div class="panel-header">
        <h2>阅读日历</h2>
        <div class="calendar-controls">
          <button id="prev-month" class="icon-btn" aria-label="上个月">‹</button>
          <div id="month-label"></div>
          <button id="next-month" class="icon-btn" aria-label="下个月">›</button>
        </div>
      </div>
      <div class="weekday-row">
        <span>一</span>
        <span>二</span>
        <span>三</span>
        <span>四</span>
        <span>五</span>
        <span>六</span>
        <span>日</span>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <div id="selected-day-summary" class="selected-day-summary"></div>
      <div class="legend">
        <span>低</span>
        <div class="legend-swatches">
          <i class="lv0"></i><i class="lv1"></i><i class="lv2"></i><i class="lv3"></i><i class="lv4"></i>
        </div>
        <span>高</span>
      </div>
    </section>

    <section class="workspace-grid">
      <div class="panel list-panel">
        <div class="panel-header">
          <h2 id="list-title">待推进材料</h2>
          <div class="filters">
            <input id="search-input" type="text" placeholder="搜索标题 / 标签">
            <select id="type-filter">
              <option value="all">全部类型</option>
              <option value="md">MD</option>
              <option value="pdf">PDF</option>
              <option value="epub">EPUB</option>
            </select>
            <select id="state-filter">
              <option value="all">全部状态</option>
              <option value="reading">阅读中</option>
              <option value="later">稍后阅读</option>
              <option value="favorite">收藏</option>
              <option value="archived">已归档</option>
            </select>
            <select id="topic-filter">
              <option value="all">全部专题</option>
            </select>
          </div>
        </div>

        <div class="tabs" id="tabs">
          <button data-tab="pending" class="tab active">待推进</button>
          <button data-tab="imported" class="tab">导入时间线</button>
          <button data-tab="completed" class="tab">完成时间线</button>
          <button data-tab="all" class="tab">全部材料</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>标题</th>
                <th>类型</th>
                <th>状态</th>
                <th>优先级</th>
                <th>进度</th>
                <th>下次触达</th>
                <th>上次阅读</th>
                <th>专题</th>
              </tr>
            </thead>
            <tbody id="materials-body"></tbody>
          </table>
        </div>
      </div>

      <aside class="panel detail-panel">
        <div class="panel-header">
          <h2>材料详情</h2>
        </div>
        <div id="detail-content" class="detail-content"></div>
      </aside>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
